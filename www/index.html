<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lairaboost</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1c24;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .loader { text-align: center; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader p { color: rgba(255,255,255,0.5); font-size: 14px; }
    .offline { display: none; text-align: center; }
    .offline h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .offline p { color: rgba(255,255,255,0.5); font-size: 15px; margin-bottom: 24px; }
    .retry-btn {
      background: #3B82F6; color: #fff; border: none;
      padding: 12px 40px; border-radius: 22px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    .retry-btn:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Loading Lairaboost...</p>
  </div>
  <div class="offline" id="offline">
    <h2>No Internet Connection</h2>
    <p>Please check your connection and try again</p>
    <button class="retry-btn" onclick="retry()">Retry</button>
  </div>
  <script>
    function retry() {
      document.getElementById('offline').style.display = 'none';
      document.getElementById('loader').style.display = 'block';
      window.location.href = 'https://lairaboost.com';
    }
    setTimeout(function() {
      window.location.href = 'https://lairaboost.com';
    }, 500);
    setTimeout(function() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('offline').style.display = 'block';
    }, 8000);
  </script>
</body>
</html>
